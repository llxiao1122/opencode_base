<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cipher · 任务</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#1e1e2e;--surface:#181825;--hover:#313244;
  --text:#cdd6f4;--dim:#585b70;--accent:#89b4fa;
  --red:#f38ba8;--yellow:#f9e2af;--green:#a6e3a1;
  --border:#313244;--radius:6px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  --mono:"SF Mono","JetBrains Mono",monospace
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;max-width:640px;margin:0 auto;width:100%}
/* header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:16px;font-weight:600}
.header h1 span{color:var(--accent)}
.header select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:13px;outline:none}
/* list */
.list{flex:1;overflow-y:auto;padding:4px 12px;-webkit-overflow-scrolling:touch}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* swipe item */
.swipe-wrap{position:relative;overflow:hidden;margin:4px 0;border-radius:var(--radius);touch-action:pan-y}
.swipe-actions{position:absolute;right:0;top:0;height:100%;display:flex;align-items:stretch}
.swipe-actions button{border:none;color:#fff;font-size:13px;padding:0 20px;cursor:pointer;font-weight:600;white-space:nowrap}
.swipe-actions .btn-done{background:var(--green);color:var(--bg)}
.swipe-actions .btn-reopen{background:var(--yellow);color:var(--bg)}
.swipe-actions .btn-delete{background:var(--border);color:var(--dim)}
.card{position:relative;background:var(--surface);padding:12px 14px;border-radius:var(--radius);transition:transform .2s ease;user-select:none;z-index:1;cursor:default;touch-action:pan-y}
.card.open{transform:translateX(calc(-100% + 80px))}
.card.completed{opacity:.5}
.card.completed .title{text-decoration:line-through;color:var(--dim)}
.card-row{display:flex;align-items:center;gap:10px}
.card .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.high{background:var(--red)}
.dot.medium{background:var(--yellow)}
.dot.low{background:var(--dim)}
.card .body{flex:1;min-width:0}
.card .title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:11px;color:var(--dim);margin-top:2px;font-family:var(--mono)}
.card .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;transition:.15s;background:transparent;color:transparent}
.card .check.done{border-color:var(--green);background:var(--green);color:var(--bg)}
/* section header */
.section{padding:8px 4px 2px;font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
/* bottom tabs */
.tabs{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tabs button{flex:1;padding:10px 0;background:transparent;border:none;color:var(--dim);font-size:13px;cursor:pointer;transition:.15s;font-family:var(--font)}
.tabs button.active{color:var(--accent);font-weight:600}
/* filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;flex-shrink:0}
.filter-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:13px;outline:none;font-family:var(--font)}
.filter-bar input::placeholder{color:var(--dim)}
.owner-picker{display:flex;gap:4px;overflow-x:auto;padding:4px 16px 8px;flex-shrink:0}
.owner-picker span{padding:2px 10px;border-radius:12px;font-size:12px;background:var(--surface);color:var(--dim);cursor:pointer;white-space:nowrap;transition:.15s;border:1px solid transparent}
.owner-picker span.active{color:var(--accent);border-color:var(--accent)}
.empty{text-align:center;padding:40px 0;color:var(--dim);font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Cipher <span>·</span> 任务</h1>
    <select v-model="filter" @change="loadTasks">
      <option value="">全部</option>
      <option value="today">今天</option>
      <option value="tomorrow">明天</option>
    </select>
  </div>

  <div class="owner-picker">
    <span :class="{active:!owner}" @click="owner='';loadTasks()">全部</span>
    <span v-for="n in ['李林骁','杨梦卓','苗笑天','谭继衡','张志斌','陈红洁']" :class="{active:owner===n}" @click="owner=n;loadTasks()">{{n}}</span>
  </div>

  <div class="list" ref="list" @scroll="closeAll">
    <div class="section" v-if="active.length">待办 · {{active.length}}</div>
    <div v-for="t in active" :key="t.id" class="swipe-wrap">
      <div class="swipe-actions">
        <button class="btn-done" @click.stop="doComplete(t)">✓ 完成</button>
      </div>
      <div class="card" :class="{open:openId===t.id}" @touchstart="onTouchStart($event,t)" @touchmove="onTouchMove($event)" @touchend="onTouchEnd($event,t)" @click="tapTask(t)">
        <div class="card-row">
          <div class="dot" :class="t.priority||'medium'"></div>
          <div class="body">
            <div class="title">{{t.title||t.action}}</div>
            <div class="meta"><template v-if="t.deadline">⏰ {{fmtDL(t.deadline)}}</template><template v-else>—</template> · {{t.publisher||t.owner||'?'}}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section" v-if="completed.length">已完成 · {{completed.length}}</div>
    <div v-for="t in completed" :key="t.id" class="swipe-wrap">
      <div class="swipe-actions">
        <button class="btn-reopen" @click.stop="doReopen(t)">重新打开</button>
      </div>
      <div class="card completed" :class="{open:openId===t.id}" @touchstart="onTouchStart($event,t)" @touchmove="onTouchMove($event)" @touchend="onTouchEnd($event,t)">
        <div class="card-row">
          <div class="body">
            <div class="title">{{t.title||t.action}}</div>
            <div class="meta">✓ {{fmtDate(t.completed_at)}}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="empty" v-if="!active.length&&!completed.length">暂无任务</div>
  </div>

  <div class="tabs">
    <button v-for="f in tabs" :class="{active:filter===f.val}" @click="filter=f.val;loadTasks()">{{f.label}}</button>
  </div>
</div>

<script>
const {createApp,ref,onMounted,nextTick} = Vue
createApp({
  setup(){
    const filter=ref('')
    const owner=ref('')
    const active=ref([])
    const completed=ref([])
    const openId=ref(null)
    const list=ref(null)
    let touchStartX=0
    const tabs=[{label:'全部',val:''},{label:'今天',val:'today'},{label:'明天',val:'tomorrow'}]

    function fmtDL(dl){
      if(!dl) return ''
      const d=dl.replace('T',' ')
      return d.length>10 ? d.slice(5,16) : d.slice(5)
    }
    function fmtDate(d){
      if(!d) return ''
      return d.slice(5,10)
    }

    async function loadTasks(){
      const url='/api/tasks?'+new URLSearchParams({filter:filter.value,owner:owner.value})
      try{
        const r=await fetch(url)
        const d=await r.json()
        active.value=d.active||[]
        completed.value=d.completed||[]
      }catch{}
    }

    async function doComplete(t){
      try{
        const r=await fetch('/api/tasks/'+t.id+'/complete',{method:'POST'})
        const d=await r.json()
        if(d.ok){openId.value=null;loadTasks()}
      }catch{}
    }

    async function doReopen(t){
      try{
        const r=await fetch('/api/tasks/'+t.id+'/reopen',{method:'POST'})
        const d=await r.json()
        if(d.ok){openId.value=null;loadTasks()}
      }catch{}
    }

    function tapTask(t){
      if(openId.value===t.id){openId.value=null;return}
      openId.value=t.id
    }

    function closeAll(){openId.value=null}

    function onTouchStart(e,t){
      touchStartX=e.touches[0].clientX
    }
    function onTouchMove(e){
      const dx=e.touches[0].clientX-touchStartX
      if(dx>-30) return
      e.currentTarget.style.transform='translateX('+Math.max(dx,-80)+'px)'
    }
    function onTouchEnd(e,t){
      const el=e.currentTarget
      el.style.transform=''
      const dx=e.changedTouches[0].clientX-touchStartX
      if(dx<-40){openId.value=t.id}
      else{openId.value=null}
    }

    onMounted(()=>loadTasks())

    return{filter,owner,active,completed,openId,list,loadTasks,doComplete,doReopen,tapTask,closeAll,onTouchStart,onTouchMove,onTouchEnd,fmtDL,fmtDate,tabs}
  }
}).mount('#app')
</script>
</body>
</html>
