<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cipher · 工班工作台</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
:root {
  --bg-base: #1e1e2e;
  --bg-surface: #181825;
  --bg-hover: #313244;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --text-dim: #585b70;
  --accent: #89b4fa;
  --red: #f38ba8;
  --yellow: #f9e2af;
  --green: #a6e3a1;
  --border: #313244;
  --radius: 6px;
  --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
  --font-mono: "SF Mono", "JetBrains Mono", "Cascadia Code", monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  justify-content: center;
}
#app {
  width: 100%;
  max-width: 640px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
}
/* header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 4px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.3px;
  color: var(--text-primary);
}
.header h1 span { color: var(--accent); }
.header .time { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }
/* task section */
.section-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  padding: 4px 0;
  margin-top: 4px;
}
.task-list { display: flex; flex-direction: column; gap: 2px; }
.task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius);
  background: var(--bg-surface);
  cursor: default;
  transition: background 0.15s;
}
.task-item:hover { background: var(--bg-hover); }
.task-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.task-dot.high { background: var(--red); }
.task-dot.medium { background: var(--yellow); }
.task-dot.low { background: var(--text-dim); }
.task-body { flex: 1; min-width: 0; }
.task-title {
  font-size: 13px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.task-meta {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}
.empty-state {
  padding: 24px 0;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}
/* chat area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 4px 0;
  min-height: 0;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.msg {
  padding: 10px 12px;
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user {
  background: var(--bg-hover);
  align-self: flex-end;
  max-width: 85%;
}
.msg.bot {
  background: var(--bg-surface);
  align-self: flex-start;
  max-width: 100%;
  border-left: 2px solid var(--accent);
}
.msg.bot .msg-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 6px;
}
.msg.bot .msg-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
}
.msg.bot .label { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
.msg.loading { color: var(--text-dim); font-style: italic; }
/* input bar */
.input-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.input-bar:focus-within { border-color: var(--accent); }
.input-bar input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13px;
  min-width: 0;
}
.input-bar input::placeholder { color: var(--text-dim); }
.icon-btn {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  border-radius: 4px;
  transition: all 0.15s;
  line-height: 1;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.send-btn {
  background: var(--accent);
  border: none;
  color: var(--bg-base);
  font-size: 16px;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 4px;
  font-weight: 600;
  transition: opacity 0.15s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
/* hidden file input */
#file-input, #voice-input { display: none; }
/* preview */
.preview-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--yellow);
}
.preview-bar .label { font-size: 12px; color: var(--yellow); }
.preview-bar .remove {
  margin-left: auto;
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 16px;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Cipher <span>·</span> 工班工作台</h1>
    <div class="time">{{ now }}</div>
  </div>

  <div class="section-title">📋 今日待办</div>
  <div class="task-list" v-if="tasks.length">
    <div class="task-item" v-for="t in tasks" :key="t.id">
      <div class="task-dot" :class="t.priority || 'medium'"></div>
      <div class="task-body">
        <div class="task-title">{{ t.title || t.action }}</div>
        <div class="task-meta">
          <template v-if="t.deadline">⏰ {{ formatDL(t.deadline) }}</template>
          <template v-else>无截止</template>
          · {{ t.publisher || '未知' }}
        </div>
      </div>
    </div>
  </div>
  <div class="empty-state" v-else>暂未加载到活跃任务</div>

  <div class="section-title">💬 消息</div>
  <div class="chat-area" ref="chatArea">
    <div v-for="(m, i) in messages" :key="i" class="msg" :class="m.role">
      <div class="msg-title" v-if="m.role === 'bot'">Cipher</div>
      {{ m.display || m.text }}
    </div>
  </div>

  <div class="preview-bar" v-if="previewText">
    <span class="label">{{ previewType === 'image' ? '📷' : '🎤' }}</span>
    <span>{{ previewText }}</span>
    <button class="remove" @click="clearPreview">✕</button>
  </div>

  <div class="input-bar">
    <button class="icon-btn" title="拍照/传图" @click="$refs.fileInput.click()">📷</button>
    <button class="icon-btn" title="录音" @click="startRecording" :style="{ color: recording ? 'var(--red)' : '' }">🎤</button>
    <input type="text" v-model="inputText" placeholder="输入消息…" @keydown.enter="sendText" :disabled="loading">
    <button class="send-btn" @click="sendText" :disabled="loading || (!inputText && !previewText)">↵</button>
  </div>
  <input id="file-input" ref="fileInput" type="file" accept="image/*" capture="environment" @change="onFileSelected">
</div>

<script>
const BASE = '/cipher';
const { createApp, ref, onMounted, nextTick } = Vue;
createApp({
  setup() {
    const inputText = ref('');
    const messages = ref([]);
    const tasks = ref([]);
    const loading = ref(false);
    const now = ref('');
    const previewText = ref('');
    const previewType = ref('');
    const previewFile = ref(null);
    const chatArea = ref(null);
    const recording = ref(false);
    let mediaRecorder = null;
    let audioChunks = [];

    function formatDL(dl) {
      if (!dl) return '';
      const d = dl.replace('T', ' ');
      if (d.length > 10) return d.slice(5, 16);
      return d.slice(5);
    }

    function formatReply(raw) {
      if (!raw) return raw;
      const lines = raw.trim().split('\n');
      const first = lines[0] || '';
      const type = first.match(/\[Cipher:(\w+)\]/)?.[1];

      if (type === 'observer') {
        const event = lines.find(l => l.includes('【事件】'))?.replace('【事件】', '').trim();
        const action = lines.find(l => l.includes('【行动】'))?.replace('【行动】', '').trim() || '';
        const extra = lines.filter(l => !l.match(/^【|^\[Cipher/) && !l.includes('📋 任务已创建')).join('\n').trim();
        const taskNote = lines.find(l => l.includes('📋 任务已创建'));
        let out = `📋 Cipher\n`;
        if (event) out += `\n${event}`;
        if (action && !action.includes('无需')) out += `\n\n**行动：**${action}`;
        else out += `\n\n无需操作。`;
        if (extra) out += `\n\n${extra}`;
        if (taskNote) out += `\n\n${taskNote}`;
        return out;
      }

      if (type === 'task' || type === 'event') {
        return lines.slice(1).join('\n').replace(/【事件】/g, '**事件：**').replace(/【位置】/g, '\n**位置：**').replace(/【行动】/g, '\n**行动：**').replace(/【来源】/g, '\n**来源：**').trim();
      }

      if (type === 'profile') {
        return lines.slice(1).join('\n').replace(/【/g, '**').replace(/】/g, '：**').trim();
      }

      return raw;
    }

    async function fetchTasks() {
      try {
        const r = await fetch(BASE + '/tasks');
        tasks.value = await r.json();
      } catch {}
    }

    function addMessage(role, text, isFormatted) {
      messages.value.push({ role, text, display: isFormatted ? text : formatReply(text) });
      nextTick(() => {
        if (chatArea.value) chatArea.value.scrollTop = chatArea.value.scrollHeight;
      });
    }

    async function sendText() {
      const text = inputText.value.trim();
      if (!text && !previewFile.value) return;
      if (loading.value) return;

      let sendText = text;
      loading.value = true;

      if (previewFile.value && previewType.value === 'image') {
        const fd = new FormData();
        fd.append('file', previewFile.value);
        fd.append('caption', text);
        addMessage('user', `[图片] ${text || ''}`, true);
        try {
          const r = await fetch(BASE + '/upload/image', { method: 'POST', body: fd });
          const d = await r.json();
          addMessage('bot', d.reply || '（无回复）');
        } catch (e) {
          addMessage('bot', '上传失败', true);
        }
        clearPreview();
        loading.value = false;
        return;
      }

      if (previewFile.value && previewType.value === 'voice') {
        const fd = new FormData();
        fd.append('file', previewFile.value);
        addMessage('user', '🎤 语音消息', true);
        try {
          const r = await fetch(BASE + '/upload/voice', { method: 'POST', body: fd });
          const d = await r.json();
          addMessage('bot', `（转文字：${d.text}）\n${d.reply}`);
        } catch (e) {
          addMessage('bot', '语音处理失败', true);
        }
        clearPreview();
        loading.value = false;
        return;
      }

      if (text) {
        addMessage('user', text);
        inputText.value = '';
        const fd = new FormData();
        fd.append('text', text);
        try {
          const r = await fetch(BASE + '/message', { method: 'POST', body: fd });
          const d = await r.json();
          addMessage('bot', d.reply || '（无回复）');
        } catch (e) {
          addMessage('bot', '处理出错', true);
        }
      }

      loading.value = false;
      fetchTasks();
    }

    function onFileSelected(e) {
      const file = e.target.files[0];
      if (!file) return;
      previewType.value = 'image';
      previewText.value = file.name;
      previewFile.value = file;
      e.target.value = '';
    }

    function startRecording() {
      if (recording.value) {
        mediaRecorder.stop();
        recording.value = false;
        return;
      }
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        addMessage('bot', '当前浏览器不支持录音');
        return;
      }
      audioChunks = [];
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
          mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
          mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            if (audioChunks.length) {
              const blob = new Blob(audioChunks, { type: 'audio/webm' });
              previewType.value = 'voice';
              previewText.value = `录音 ${(blob.size / 1024).toFixed(0)}KB`;
              previewFile.value = new File([blob], 'voice.webm', { type: 'audio/webm' });
            }
          };
          mediaRecorder.start();
          recording.value = true;
        })
        .catch(() => addMessage('bot', '录音权限被拒绝', true));
    }

    function clearPreview() {
      previewText.value = '';
      previewType.value = '';
      previewFile.value = null;
    }

    function updateTime() {
      const d = new Date();
      now.value = d.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit', month: '2-digit', day: '2-digit' });
    }

    onMounted(() => {
      fetchTasks();
      setInterval(fetchTasks, 30000);
      updateTime();
      setInterval(updateTime, 10000);
    });

    return { inputText, messages, tasks, loading, now, chatArea, sendText, onFileSelected, startRecording, clearPreview, previewText, previewType, recording, formatDL, formatReply };
  }
}).mount('#app');
</script>
</body>
</html>
