<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Cipher · 任务</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js">
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
.confirm-btn{flex-shrink:0;background:var(--green);color:var(--bg);border:none;border-radius:var(--radius);padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font)}
:root{
  --bg:#1e1e2e;--surface:#181825;--hover:#313244;
  --text:#cdd6f4;--dim:#585b70;--accent:#89b4fa;
  --red:#f38ba8;--yellow:#f9e2af;--green:#a6e3a1;
  --border:#313244;--radius:6px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  --mono:"SF Mono","JetBrains Mono",monospace
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;max-width:640px;margin:0 auto;width:100%}
/* header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:16px;font-weight:600}
.header h1 span{color:var(--accent)}
.header select{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:4px 8px;font-size:13px;outline:none}
/* list */
.list{flex:1;overflow-y:auto;padding:4px 12px;-webkit-overflow-scrolling:touch}
.list::-webkit-scrollbar{width:4px}
.list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card{background:var(--surface);padding:12px 14px;border-radius:var(--radius);margin:4px 0}
.card.completed{opacity:.5}
.card.completed .title{text-decoration:line-through;color:var(--dim)}
.card-row{display:flex;align-items:center;gap:10px}
.card .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.high{background:var(--red)}
.dot.medium{background:var(--yellow)}
.dot.low{background:var(--dim)}
.card .body{flex:1;min-width:0}
.card .title{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:11px;color:var(--dim);margin-top:2px;font-family:var(--mono)}
.card .check{width:22px;height:22px;border-radius:50%;border:2px solid var(--dim);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;transition:.15s;background:transparent;color:transparent}
.card .check.done{border-color:var(--green);background:var(--green);color:var(--bg)}
.btn-done,.btn-reopen{flex-shrink:0;border:none;border-radius:var(--radius);padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font);transition:.15s}
.btn-done{background:var(--green);color:var(--bg)}
.btn-reopen{background:var(--yellow);color:var(--bg)}
/* section header */
.section{padding:8px 4px 2px;font-size:11px;color:var(--dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
/* bottom tabs */
.tabs{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.tabs button{flex:1;padding:10px 0;background:transparent;border:none;color:var(--dim);font-size:13px;cursor:pointer;transition:.15s;font-family:var(--font)}
.tabs button.active{color:var(--accent);font-weight:600}
/* filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;flex-shrink:0}
.filter-bar input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:13px;outline:none;font-family:var(--font)}
.filter-bar input::placeholder{color:var(--dim)}
.owner-picker{display:flex;gap:4px;overflow-x:auto;padding:4px 16px 8px;flex-shrink:0}
.owner-picker span{padding:2px 10px;border-radius:12px;font-size:12px;background:var(--surface);color:var(--dim);cursor:pointer;white-space:nowrap;transition:.15s;border:1px solid transparent}
.owner-picker span.active{color:var(--accent);border-color:var(--accent)}
.empty{text-align:center;padding:40px 0;color:var(--dim);font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>Cipher <span>·</span> 工班</h1>
  </div>

  <template v-if="tab==='team'">
    <div class="owner-picker">
      <span :class="{active:!owner}" @click="owner='';loadTasks()">全部</span>
      <span v-for="n in members" :class="{active:owner===n}" @click="owner=n;loadTasks()">{{n}}</span>
    </div>
  </template>

  <div class="list" ref="list" @scroll="closeAll">
    <template v-if="tab==='team'">
      <div class="section" v-if="active.length">待办 · {{active.length}}</div>
      <div v-for="t in active" :key="t.id" style="margin:4px 0">
        <div class="card" @click="isParentView?tapTask(t):null">
          <div class="card-row">
            <div class="dot" :class="t.priority||'medium'"></div>
            <div class="body">
              <div class="title">{{t.title}}</div>
              <div class="meta">
                <template v-if="isParentView">{{t.publisher||'?'}}<template v-if="t.deadline"> · ⏰ {{fmtDL(t.deadline)}}</template></template>
                <template v-else>{{t.parent_title}} · {{t.owner}}<template v-if="t.deadline"> · ⏰ {{fmtDL(t.deadline)}}</template></template>
              </div>
            </div>
            <button v-if="!isParentView" class="btn-done" @click.stop="doComplete(t)">✓</button>
          </div>
        </div>
      </div>
      <div class="section" v-if="completed.length">已完成 · {{completed.length}}</div>
      <div v-for="t in completed" :key="t.id" style="margin:4px 0">
        <div class="card completed">
          <div class="card-row">
            <div class="body">
              <div class="title">{{t.title}}</div>
              <div class="meta">
                <template v-if="isParentView">{{t.publisher||'?'}} · ✓ {{fmtDate(t.completed_at)}}</template>
                <template v-else>{{t.owner}} · ✓ {{fmtDate(t.completed_at)}}</template>
              </div>
            </div>
            <button v-if="!isParentView" class="btn-reopen" @click.stop="doReopen(t)">↺</button>
          </div>
        </div>
      </div>
      <div class="empty" v-if="!active.length&&!completed.length">暂无任务</div>
    </template>

    <template v-if="tab==='pending'">
      <div class="section">{{pending.length}} 项全员完成，待你确认</div>
      <div v-for="p in pending" :key="p.parent_id" class="card" style="margin:4px 0">
        <div class="card-row">
          <div class="dot" :class="p.parent_priority||'medium'"></div>
          <div class="body">
            <div class="title">{{p.parent_title}}</div>
            <div class="meta">{{p.completed_count}}/{{p.total}} 已完成<template v-if="p.parent_deadline"> · ⏰ {{fmtDL(p.parent_deadline)}}</template></div>
          </div>
          <button class="confirm-btn" @click="doConfirm(p.parent_id)">确认</button>
        </div>
      </div>
      <div class="empty" v-if="!pending.length">暂无待确认任务</div>
    </template>
  </div>

  <div class="tabs">
    <button v-for="f in tabs" :class="{active:tab===f.val}" @click="tab=f.val;loadTasks()">{{f.label}}<template v-if="f.val==='pending'&&pendingCount">({{pendingCount}})</template></button>
  </div>
</div>

<script>
const {createApp,ref,computed,onMounted} = Vue
createApp({
  setup(){
    const tab=ref('team')
    const owner=ref('')
    const active=ref([])
    const completed=ref([])
    const pending=ref([])
    const pendingCount=ref(0)
    const openId=ref(null)
    const list=ref(null)
    const members=['杨梦卓','苗笑天','谭继衡','张志斌','陈红洁']
    const tabs=[{label:'工班任务',val:'team'},{label:'待确认',val:'pending'}]
    const isParentView=computed(()=>owner.value==='')

    function fmtDL(dl){
      if(!dl) return ''
      const d=dl.replace('T',' ')
      return d.length>10 ? d.slice(5,16) : d.slice(5)
    }
    function fmtDate(d){
      if(!d) return ''
      return d.slice(5,10)
    }

    const BASE = '/cipher'
    async function loadTasks(){
      if(tab.value==='team'){
        if(owner.value===''){
          try{
            const r=await fetch(BASE+'/api/tasks')
            const d=await r.json()
            active.value=d.active||[]
            completed.value=d.completed||[]
          }catch{}
        }else{
          try{
            const r=await fetch(BASE+'/api/team-tasks?'+new URLSearchParams({owner:owner.value}))
            const d=await r.json()
            active.value=(d||[]).filter(t=>t.status==='active')
            completed.value=(d||[]).filter(t=>t.status==='completed')
          }catch{}
        }
      }else{
        try{
          const r=await fetch(BASE+'/api/team-tasks/pending')
          const d=await r.json()
          pending.value=d||[]
          pendingCount.value=pending.value.length
        }catch{}
      }
    }

    async function doComplete(t){
      try{
        const r=await fetch(BASE+'/api/team-tasks/'+t.id+'/complete',{method:'POST'})
        const d=await r.json()
        if(d.ok){openId.value=null;loadTasks()}
      }catch{}
    }

    async function doReopen(t){
      try{
        const r=await fetch(BASE+'/api/team-tasks/'+t.id+'/reopen',{method:'POST'})
        const d=await r.json()
        if(d.ok){openId.value=null;loadTasks()}
      }catch{}
    }

    async function doConfirm(parentId){
      try{
        const r=await fetch(BASE+'/api/team-tasks/'+parentId+'/confirm',{method:'POST'})
        const d=await r.json()
        if(d.ok) loadTasks()
      }catch{}
    }

    function tapTask(t){
      if(openId.value===t.id){openId.value=null;return}
      openId.value=t.id
    }

    function closeAll(){openId.value=null}

    onMounted(()=>loadTasks())

    return{tab,owner,members,active,completed,pending,pendingCount,openId,list,loadTasks,doComplete,doReopen,doConfirm,tapTask,closeAll,fmtDL,fmtDate,tabs,isParentView}
  }
}).mount('#app')
</script>
</body>
</html>
